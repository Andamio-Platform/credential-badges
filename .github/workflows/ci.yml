name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  allowlist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce served-file allowlist
        run: bash scripts/ci/check-allowlist.sh

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push) — proves the Dockerfile + allowlist build
        run: docker build -t credential-badges:ci .
      - name: Smoke test — context + issuer profile resolve with JSON-LD content type
        run: |
          docker run -d --name cb -p 8080:8080 credential-badges:ci
          sleep 2
          for path in /context/v0.jsonld /issuer; do
            ct=$(curl -sI "http://localhost:8080${path}" | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type"{print $2}')
            echo "${path} Content-Type: $ct"
            test "$ct" = "application/ld+json"
            curl -sf "http://localhost:8080${path}" >/dev/null
          done
          docker rm -f cb
