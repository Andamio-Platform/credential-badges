name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  allowlist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce served-file allowlist
        run: bash scripts/ci/check-allowlist.sh

  did-pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: did.json regenerator + key-pin invariant (self-consistency guard)
        # Hermetic self-consistency check: the committed did.json must decode to
        # the pinned key constant. Catches a bad edit to did.json — NOT a live
        # KMS rotation (the live-KMS re-fetch is env-gated on KMS_LIVE_PIN and
        # skips here; its cloudkms.publicKeyViewer grant + scheduled reconcile
        # land at Rung 8, per plan KTD-2). No install — tools/ is dependency-free.
        run: node --experimental-strip-types --test tools/*.test.ts

  signer-spike-hardening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: "Signer-spike hardening tests (issue #54) — hermetic: fetch is mocked, no KMS, no npm install (the tested modules are dependency-free)"
        run: node --experimental-strip-types --test spike/signer-spike/*.test.ts

  expansion-pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: "Signed-artifact expansion pin — canonicalizes the committed signed artifacts (signed-credential.json, status/key-epoch-2026-07.json) under the COMMITTED context/v1.jsonld and pins the RDF dataset hash, so no context PR can silently change what the committed proofs were computed over. Needs the spike's jsonld dep (npm ci — not in the hermetic job); network touches only the version-pinned immutable W3C/OB3 contexts."
        working-directory: spike/signer-spike
        run: |
          npm ci
          npm run test:expansion-pin

  issuer-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: "Issuer-service test suite (Rung 8.4) — hermetic: Andamioscan responses are recorded fixtures, contexts are vendored + integrity-pinned, signing runs through the ephemeral Ed25519 seam (no KMS, no network). Covers the full request path: gate -> map -> sign -> loopback verify, cache single-sign invariant, tampered-subject refusals, startup drift-check fail-closed paths."
        working-directory: issuer-service
        run: |
          npm ci
          npm test
      - name: Build issuer image (no push) — proves issuer-service/Dockerfile
        run: docker build -f issuer-service/Dockerfile -t credential-badges-issuer:ci .
      - name: "Container smoke — ephemeral signer mode: boots without KMS, /healthz serves, malformed params 400 with no upstream call, non-/credentials routes 404"
        run: |
          docker run -d --name cbi -p 8081:8080 -e SIGNER_MODE=ephemeral credential-badges-issuer:ci
          sleep 2
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8081/healthz)
          echo "/healthz -> $code (expected 200)"
          test "$code" = "200"
          code=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:8081/credentials/mainnet/nothex/alsonothex/james")
          echo "malformed params -> $code (expected 400)"
          test "$code" = "400"
          code=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:8081/.well-known/did.json")
          echo "/.well-known/did.json -> $code (expected 404: did.json belongs to the static host)"
          test "$code" = "404"
          docker rm -f cbi

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push) — proves the Dockerfile + allowlist build
        run: docker build -t credential-badges:ci .
      - name: Smoke test — served paths resolve with correct content types
        run: |
          docker run -d --name cb -p 8080:8080 credential-badges:ci
          sleep 2
          assert_ct() {
            ct=$(curl -sI "http://localhost:8080$1" | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type"{print $2}')
            echo "$1 Content-Type: $ct (expected $2)"
            test "$ct" = "$2"
            curl -sf "http://localhost:8080$1" >/dev/null
          }
          # Loop the checked-out context dir so future versions are covered
          # with no edit here.
          for f in context/*.jsonld; do
            assert_ct "/$f" application/ld+json
          done
          assert_ct /issuer              application/ld+json
          assert_ct /.well-known/did.json application/did+ld+json
          assert_ct /did.json            application/did+ld+json
          # Key-epoch status list (Rung 8.3): a JSON-LD VC served as
          # application/ld+json — the .json extension must not drag it back
          # to application/json. The `^~ /status/` prefix location covers the
          # whole tree so the NEXT key-epoch file inherits these headers
          # automatically; a nonexistent status path must 404 inside the
          # location (no fallthrough to another handler).
          assert_ct /status/key-epoch-2026-07.json application/ld+json
          status_404=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/status/no-such-epoch.json)
          echo "/status/no-such-epoch.json -> $status_404 (expected 404)"
          test "$status_404" = "404"
          assert_ct /badges/_placeholder.svg image/svg+xml
          assert_ct /design/             text/html
          assert_ct /                    text/plain
          # /design must 301 to exactly /design/ — index.html loads assets
          # via relative paths (they break without the trailing slash), and
          # the Location must be RELATIVE: behind Cloud Run's proxy an
          # absolute redirect leaks http:// + :8080 into the public URL.
          loc=$(curl -sI http://localhost:8080/design | tr -d '\r' | awk -F': ' 'tolower($1)=="location"{print $2}')
          echo "/design Location: $loc (expected /design/)"
          test "$loc" = "/design/"
          # /did.json is a resolver-deviation alias (issue #54 item 8) that must
          # serve the SAME bytes as the canonical /.well-known/did.json — the
          # nginx location try_files the canonical file, so any divergence means
          # the alias drifted.
          curl -sf http://localhost:8080/.well-known/did.json -o canonical.json
          curl -sf http://localhost:8080/did.json -o alias.json
          cmp canonical.json alias.json && echo "/did.json is byte-identical to /.well-known/did.json"
          docker rm -f cb
      - name: Test on-demand render fallback (#33, U5) — static-first + @render proxy
        run: IMAGE=credential-badges:ci bash scripts/ci/test-nginx-fallback.sh
