name: deploy-issuer

# ============================================================================
# INERT SKELETON — DO NOT TAG service-v* UNTIL THE OPS GATE LANDS.
# ============================================================================
# OB3 issuer service (Rung 8.4, deployment plan Decision 5) — the THIRD Cloud
# Run service. Distinct from deploy.yml (static host, `v[0-9]*.*.*`) and
# deploy-render.yml (render service, `vrender-*`).
#
# Triggers ONLY on `service-v*` tags, per the plan's Decision 5: the issuer's
# WIF provider MUST constrain `attribute.ref` to `refs/tags/service-v*`, and
# the two existing WIFs' ref-constraints must be NON-OVERLAPPING with it, so
# no tag prefix can mint another lane's token. Until the private-ops Terraform
# provisions that WIF provider + SA, a `service-v*` tag cannot mint a deploy
# token — this workflow is structurally inert, not merely unused.
#
# THE OPS GATE (all required before the first `service-v0.1.0` tag):
#   1. REGION DECISION — us-central1 vs europe-west4 (the KMS key currently
#      lives in us-central1; a region move may also move/recreate the key,
#      which re-runs the did.json pipeline).
#   2. SIGN-SA ATTACH — the Cloud Run service runs AS the sign-only SA
#      (the service signs via the metadata-server identity; no impersonation).
#      The deploy (CI/CD) identity and the sign identity stay distinct: a CI
#      compromise must not be able to sign.
#   3. SIGN-ONLY WIF — new WIF provider ref-constrained to refs/tags/service-v*,
#      bound to a deploy SA that can push images + deploy THIS service only.
#   4. LB DELTA — external HTTPS LB URL map: path matcher /credentials/* ->
#      serverless NEG for credential-badges-issuer; default -> static host.
#      (Cloud Run domain mappings cannot path-route.)
#   5. IAM SCOPE-DOWN (issue #54 finding 4 / "8b") — the sign SA holds
#      cloudkms.signerVerifier + cloudkms.publicKeyViewer on the ONE key
#      version, nothing else; KMS Cloud Audit Logs enabled and retained.
#   6. Repo variables set (Settings -> Actions -> Variables), which this
#      workflow reads — values live in the private ops Terraform, NOT here:
#        ISSUER_GCP_REGION       e.g. the region from (1)
#        ISSUER_AR_IMAGE         Artifact Registry image path for the issuer
#        ISSUER_WIF_PROVIDER     the sign-lane WIF provider resource name (3)
#        ISSUER_CICD_SA          the issuer-lane deploy SA email (3)
#        ISSUER_KMS_KEY_VERSION  full CryptoKeyVersion resource name (1)/(5)
#
# SECOND-ORDER TRAP — ISSUER_KMS_KEY_VERSION GATES BUT DOES NOT CONFIGURE:
# the ops-gate step below refuses to run while the variable is unset, but the
# deploy step is deliberately IMAGE-ONLY — the service's runtime env (incl.
# KMS_KEY_VERSION_NAME), its SA, and scaling are owned by the private-ops
# Terraform. Changing this repo variable does NOT change which key the
# running service signs with; only the Terraform delta does. Keep the two in
# sync manually or the gate will pass while the runtime signs under the old
# key version (the boot drift check is the backstop that catches the skew).

on:
  push:
    tags:
      - "service-v*"

permissions:
  contents: read
  id-token: write # required for WIF OIDC

env:
  GCP_PROJECT: andamio-credentials
  GCP_SERVICE: credential-badges-issuer
  # TODO(ops-gate): all five values below are provided as repo variables by
  # the private-ops Terraform delta. They are deliberately NOT hardcoded —
  # the region decision is pending and inventing values here would let a tag
  # deploy against a guessed topology.
  GCP_REGION: ${{ vars.ISSUER_GCP_REGION }}
  AR_IMAGE: ${{ vars.ISSUER_AR_IMAGE }}
  WIF_PROVIDER: ${{ vars.ISSUER_WIF_PROVIDER }}
  CICD_SA: ${{ vars.ISSUER_CICD_SA }}
  KMS_KEY_VERSION_NAME: ${{ vars.ISSUER_KMS_KEY_VERSION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ops gate — refuse to run until the required repo variables exist
        run: |
          missing=0
          for v in GCP_REGION AR_IMAGE WIF_PROVIDER CICD_SA KMS_KEY_VERSION_NAME; do
            if [ -z "${!v}" ]; then
              echo "::error::ops gate not satisfied: repo variable for $v is unset (see the header of this workflow)"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            echo "This workflow is an INERT SKELETON until the private-ops Terraform delta lands (region, sign-SA attach, sign-only WIF service-v*, LB /credentials/* route, KMS IAM scope-down)."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Enforce served-file allowlist
        run: bash scripts/ci/check-allowlist.sh

      - name: Run the issuer test suite before any deploy step
        working-directory: issuer-service
        run: |
          npm ci
          npm test

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.CICD_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      # Build context MUST be the repo root: the image bakes context/,
      # .well-known/did.json, status/, generator/credentials.json and tools/.
      - name: Build + tag (SHA-pinned AND service-v tag; never :latest)
        run: |
          TAG="${GITHUB_REF_NAME}"
          docker build -f issuer-service/Dockerfile -t "${AR_IMAGE}:${GITHUB_SHA}" -t "${AR_IMAGE}:${TAG}" .

      - name: Push (immutable AR rejects any re-push of an existing tag)
        run: |
          docker push "${AR_IMAGE}:${GITHUB_SHA}"
          docker push "${AR_IMAGE}:${GITHUB_REF_NAME}"

      # The service's runtime SA (the SIGN SA), KMS env wiring, and scaling
      # limits are managed by the private-ops Terraform. Keep this step
      # image-only so it never clobbers the TF-managed surface.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${GCP_SERVICE}" \
            --image "${AR_IMAGE}:${GITHUB_REF_NAME}" \
            --region "${GCP_REGION}" \
            --project "${GCP_PROJECT}" \
            --platform managed \
            --quiet

      # The startup drift check runs inside the container BEFORE the listener
      # opens, so a healthy /healthz here already proves: KMS key == live
      # did.json pin, live context == committed context, key version in
      # registry. The credential probe exercises the full live path on the
      # known subject credential (the spike/signer-spike subject).
      - name: Verify /healthz + a live signed credential
        run: |
          URL=$(gcloud run services describe "${GCP_SERVICE}" --region "${GCP_REGION}" --project "${GCP_PROJECT}" --format='value(status.url)')
          echo "service URL: ${URL}"
          code=$(curl -s -o /dev/null -w '%{http_code}' "${URL}/healthz")
          echo "/healthz -> ${code}"
          test "${code}" = "200"
          CRED="/credentials/mainnet/ae192632aabe00ed2042eaef596bc15f3887fa32e75e8f9b8fa516df/e9b5343186f83ed804a9fd87293a7378e3b237743b76d56da73b111d855631db/james"
          # GET (the service is GET-only; HEAD is 405 by design).
          ct=$(curl -s -o /dev/null -w '%{content_type}' "${URL}${CRED}")
          echo "${CRED} Content-Type: ${ct} (expected application/ld+json)"
          test "${ct}" = "application/ld+json"
