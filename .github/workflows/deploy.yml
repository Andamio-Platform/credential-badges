name: deploy

# Triggers ONLY on semver version tags. This matches the WIF binding, which is
# ref-constrained at the OIDC assertion level to refs/tags/v* in the
# private ops Terraform. A push to a branch or a workflow_dispatch cannot
# mint a deploy token even if this file were tampered with on a feature
# branch — enforcement is at token-mint time.
#
# The pattern is `v[0-9]*.*.*` (not `v*.*.*`) so the render service's
# `vrender-*` tags (deploy-render.yml) never double-fire the static deploy:
# `vrender-1.0.0` matches `v*.*.*` but NOT `v[0-9]*.*.*`.
on:
  push:
    tags:
      - "v[0-9]*.*.*"

permissions:
  contents: read
  id-token: write # required for WIF OIDC

env:
  # Same host as the did:web DID (tools/gen-did-json.ts) and the hardcoded
  # probe URL in deploy-issuer.yml — a rename must touch all three.
  PUBLIC_HOST: credentials.andamio.io
  GCP_PROJECT: andamio-credentials
  GCP_REGION: us-central1
  GCP_SERVICE: credential-badges
  AR_IMAGE: us-central1-docker.pkg.dev/andamio-credentials/credential-badges/app
  WIF_PROVIDER: projects/780530615158/locations/global/workloadIdentityPools/credential-badges-pool/providers/github-actions
  CICD_SA: credential-badges-cicd-sa@andamio-credentials.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enforce served-file allowlist
        run: bash scripts/ci/check-allowlist.sh

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.CICD_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build + tag (SHA-pinned AND semver; never :latest)
        run: |
          SEMVER="${GITHUB_REF_NAME}"
          docker build -t "${AR_IMAGE}:${GITHUB_SHA}" -t "${AR_IMAGE}:${SEMVER}" .

      - name: Push (immutable AR rejects any re-push of an existing tag)
        run: |
          docker push "${AR_IMAGE}:${GITHUB_SHA}"
          docker push "${AR_IMAGE}:${GITHUB_REF_NAME}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${GCP_SERVICE}" \
            --image "${AR_IMAGE}:${GITHUB_REF_NAME}" \
            --region "${GCP_REGION}" \
            --project "${GCP_PROJECT}" \
            --platform managed \
            --quiet

      - name: Verify Content-Type + reachability on the *.run.app URL
        run: |
          URL=$(gcloud run services describe "${GCP_SERVICE}" --region "${GCP_REGION}" --project "${GCP_PROJECT}" --format='value(status.url)')
          assert_ct() {
            ct=$(curl -sI "${URL}$1" | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type"{print $2}')
            echo "$1 Content-Type: $ct (expected $2)"
            test "$ct" = "$2"
            curl -sf "${URL}$1" >/dev/null
          }
          # Loop the checked-out context dir so future versions are covered
          # with no edit here (same genericity as the byte-verify step below).
          for f in context/*.jsonld; do
            assert_ct "/$f" application/ld+json
          done
          assert_ct /issuer              application/ld+json
          assert_ct /.well-known/did.json application/did+ld+json
          assert_ct /badges/_placeholder.svg image/svg+xml

      - name: Verify served context bytes on the public host (freeze pin, end to end)
        # The repo-side freeze pin (tools/context-freeze.test.ts) proves the
        # COMMITTED bytes never change; this closes the repo-vs-served gap the
        # repo test cannot see (stale image, LB misroute, tag cut from a red
        # branch). Probing the PUBLIC host, not *.run.app, is deliberate — the
        # issuer lane already paid for that lesson (#62/#63): only the LB route
        # proves what verifiers actually fetch. Compares against the checked-out
        # tag's bytes, so future context versions are covered with no edit here;
        # CI's freeze test guarantees those bytes equal the immutable pins.
        run: |
          for f in context/*.jsonld; do
            expected=$(sha256sum "$f" | cut -d' ' -f1)
            for attempt in 1 2 3 4 5; do
              # Fetch to a file, not $(...): command substitution strips the
              # trailing newline and would hash different bytes than served.
              if curl -sf "https://${PUBLIC_HOST}/$f" -o served.jsonld; then
                served=$(sha256sum served.jsonld | cut -d' ' -f1)
              else
                served="fetch-failed"
              fi
              [ "$served" = "$expected" ] && break
              echo "attempt $attempt: /$f served=$served expected=$expected — retrying"
              sleep 5
            done
            echo "/$f sha256: $served (expected $expected)"
            test "$served" = "$expected"
          done
