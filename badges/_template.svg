<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0.3" x2="1" y2="0.7">
      <stop offset="0%" stop-color="#1f5d7a"/>
      <stop offset="28%" stop-color="#3a8ac4"/>
      <stop offset="52%" stop-color="#9080a0"/>
      <stop offset="72%" stop-color="#ee7f3a"/>
      <stop offset="100%" stop-color="#d94a2a"/>
    </linearGradient>

    <linearGradient id="ribbonGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a6d8a"/>
      <stop offset="35%" stop-color="#3a8ac4"/>
      <stop offset="55%" stop-color="#8c8a9a"/>
      <stop offset="70%" stop-color="#ee7f3a"/>
      <stop offset="100%" stop-color="#d94a2a"/>
    </linearGradient>

    <mask id="frameMask">
      <rect width="1024" height="1024" fill="white"/>
      <path d="M 512 118 L 819 195 L 819 528 L 793 716 C 822 815 585 875 512 920 C 439 875 202 815 231 716 L 205 528 L 205 195 Z" fill="black"/>
    </mask>
  </defs>

  <!-- Shield frame -->
  <g mask="url(#frameMask)">
    <!-- Outer shield: vertical sides → S-curve → point -->
    <path d="M 512 75 L 849 170 L 849 540 L 818 720 C 850 830 590 905 512 955 C 434 905 174 830 206 720 L 175 540 L 175 170 Z" fill="url(#shieldGrad)"/>

    <!-- Cool side facets -->
    <polygon points="175,170 350,120 250,185" fill="#3aa0bc" opacity="0.35"/>
    <polygon points="350,120 512,75 430,145" fill="#5cb3c4" opacity="0.40"/>
    <polygon points="175,170 175,310 250,250" fill="#2a8a9e" opacity="0.45"/>
    <polygon points="175,310 175,470 250,420" fill="#5cb3c4" opacity="0.40"/>
    <polygon points="175,470 175,540 250,510" fill="#3aa0bc" opacity="0.45"/>
    <polygon points="175,540 250,620 250,540" fill="#2a8a9e" opacity="0.55"/>
    <polygon points="175,540 175,690 250,620" fill="#5cb3c4" opacity="0.40"/>
    <polygon points="175,690 206,720 250,620" fill="#3aa0bc" opacity="0.45"/>
    <polygon points="206,720 290,830 250,790" fill="#2a8a9e" opacity="0.45"/>
    <polygon points="290,830 420,910 360,880" fill="#5cb3c4" opacity="0.40"/>
    <polygon points="420,910 512,955 470,940" fill="#3aa0bc" opacity="0.40"/>

    <!-- Warm side facets -->
    <polygon points="512,75 670,150 580,120" fill="#3a8ac4" opacity="0.40"/>
    <polygon points="670,150 849,170 770,185" fill="#4a8ac4" opacity="0.40"/>
    <polygon points="849,170 849,310 770,250" fill="#ee7f3a" opacity="0.40"/>
    <polygon points="849,310 849,460 770,400" fill="#d94a2a" opacity="0.40"/>
    <polygon points="849,460 849,540 770,510" fill="#ee7f3a" opacity="0.50"/>
    <polygon points="849,540 770,620 770,540" fill="#d94a2a" opacity="0.50"/>
    <polygon points="849,540 849,690 770,620" fill="#ee7f3a" opacity="0.40"/>
    <polygon points="849,690 818,720 770,620" fill="#d94a2a" opacity="0.45"/>
    <polygon points="818,720 734,830 770,790" fill="#ee7f3a" opacity="0.45"/>
    <polygon points="734,830 604,910 664,880" fill="#f4a04c" opacity="0.40"/>
    <polygon points="604,910 512,955 554,940" fill="#ee7f3a" opacity="0.40"/>
  </g>

  <!-- White inner frame outline -->
  <path d="M 512 118 L 819 195 L 819 528 L 793 716 C 822 815 585 875 512 920 C 439 875 202 815 231 716 L 205 528 L 205 195 Z"
        fill="none" stroke="#ffffff" stroke-width="7" stroke-linejoin="miter"/>

  <!-- Ribbon -->
  <g>
    <path d="M 105 555 L 919 555 L 879 620 L 919 685 L 105 685 L 145 620 Z"
          fill="url(#ribbonGrad)"/>

    <polygon points="105,555 350,555 105,685" fill="#2a6d8a" opacity="0.40"/>
    <polygon points="350,555 500,555 280,685 105,685" fill="#3a8ac4" opacity="0.35"/>
    <polygon points="500,555 650,555 450,685 280,685" fill="#7a8aa0" opacity="0.30"/>
    <polygon points="650,555 800,555 600,685 450,685" fill="#ee7f3a" opacity="0.30"/>
    <polygon points="800,555 919,555 919,685 600,685" fill="#d94a2a" opacity="0.40"/>

    <path d="M 145 620 L 105 555 L 105 685 Z" fill="#1a4a6a" opacity="0.45"/>
    <path d="M 879 620 L 919 555 L 919 685 Z" fill="#a93a1a" opacity="0.45"/>
  </g>
</svg>
